name: reusable deploy production

on:
  workflow_call:
    inputs:
      target_sha:
        required: true
        type: string
      backend_image_repo:
        required: true
        type: string
      backend_image_ref:
        required: true
        type: string
      frontend_image_repo:
        required: true
        type: string
      frontend_image_ref:
        required: true
        type: string

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    name: deploy production
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: production
    steps:
      - name: validate ssh fingerprint configured
        env:
          DEPLOY_HOST_FINGERPRINT: ${{ vars.DEPLOY_HOST_FINGERPRINT }}
        run: |
          if [ -z "${DEPLOY_HOST_FINGERPRINT}" ]; then
            echo "::error::DEPLOY_HOST_FINGERPRINT is required for production deploys (set repo/environment variable from 'ssh-keyscan -H \$DEPLOY_HOST | ssh-keygen -lf -')"
            exit 1
          fi

      - name: deploy over ssh
        id: deploy
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ vars.DEPLOY_PORT || 22 }}
          fingerprint: ${{ vars.DEPLOY_HOST_FINGERPRINT }}
          command_timeout: 10m
          script: |
            set -Eeuo pipefail

            deploy_path='${{ secrets.DEPLOY_PATH }}'
            target_sha='${{ inputs.target_sha }}'
            backend_image_ref='${{ inputs.backend_image_ref }}'
            frontend_image_ref='${{ inputs.frontend_image_ref }}'

            cd "$deploy_path"
            git fetch --prune origin
            git reset --hard "$target_sha"

            echo '${{ github.token }}' | docker login ghcr.io -u '${{ github.actor }}' --password-stdin

            cd deployment/docker
            compose() {
              docker compose --env-file ../../.env -f docker-compose.yml -f docker-compose.ci.yml "$@"
            }

            BACKEND_IMAGE="$backend_image_ref" FRONTEND_IMAGE="$frontend_image_ref" compose pull backend frontend
            BACKEND_IMAGE="$backend_image_ref" FRONTEND_IMAGE="$frontend_image_ref" compose up -d --remove-orphans backend frontend
            BACKEND_IMAGE="$backend_image_ref" FRONTEND_IMAGE="$frontend_image_ref" compose up -d --remove-orphans nginx certbot
            BACKEND_IMAGE="$backend_image_ref" FRONTEND_IMAGE="$frontend_image_ref" compose exec -T nginx sh -c 'touch /var/run/certbot/reload-nginx'

      - name: verify backend health
        id: verify_backend
        env:
          DEPLOY_HEALTH_URL: ${{ vars.DEPLOY_HEALTH_URL }}
        run: |
          set -Eeuo pipefail

          sleep 3
          if [ -z "${DEPLOY_HEALTH_URL:-}" ]; then
            echo "::error::DEPLOY_HEALTH_URL is required for production deploy health checks"
            exit 1
          fi

          for attempt in $(seq 1 12); do
            body="$(curl -fsS --max-time 5 "$DEPLOY_HEALTH_URL" || true)"
            if printf '%s' "$body" | jq -e '.status == "ok" and .db == "ok" and .redis == "ok" and .seaweedfs == "ok" and (.schema_version | type == "number" and . > 0)' >/dev/null 2>&1; then
              echo "backend health check passed on attempt $attempt"
              exit 0
            fi
            echo "backend health check attempt $attempt failed"
            sleep 5
          done

          echo "backend health check failed after 12 attempts"
          exit 1

      - name: verify frontend health
        id: verify_frontend
        env:
          DEPLOY_FRONTEND_HEALTH_URL: ${{ vars.DEPLOY_FRONTEND_HEALTH_URL }}
        run: |
          set -Eeuo pipefail

          if [ -z "${DEPLOY_FRONTEND_HEALTH_URL:-}" ]; then
            echo "::error::DEPLOY_FRONTEND_HEALTH_URL is required for production deploy health checks"
            exit 1
          fi
          health_url="$DEPLOY_FRONTEND_HEALTH_URL"
          api_url="$(python3 - "$health_url" <<'PY'
          import sys
          from urllib.parse import urlsplit, urlunsplit

          parsed = urlsplit(sys.argv[1])
          print(urlunsplit((parsed.scheme, parsed.netloc, "/api/v1/leaderboard", "", "")))
          PY
          )"

          for attempt in $(seq 1 12); do
            if curl -fsS --max-time 5 "$health_url" >/dev/null; then
              api_body="$(curl -fsS --max-time 5 "$api_url" || true)"
              if printf '%s' "$api_body" | jq -e '.entries | type == "array"' >/dev/null 2>&1; then
                echo "frontend health and same-origin api rewrite checks passed on attempt $attempt"
                exit 0
              fi
              echo "frontend page is healthy but same-origin api rewrite check failed"
            else
              echo "frontend health check attempt $attempt failed"
            fi
            if [ "$attempt" -lt 12 ]; then
              sleep 5
            fi
          done

          echo "frontend health or same-origin api rewrite check failed after 12 attempts"
          exit 1

      - name: persist deployed sha
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ vars.DEPLOY_PORT || 22 }}
          fingerprint: ${{ vars.DEPLOY_HOST_FINGERPRINT }}
          command_timeout: 2m
          script: |
            set -Eeuo pipefail

            deploy_path='${{ secrets.DEPLOY_PATH }}'
            target_sha='${{ inputs.target_sha }}'
            backend_image_ref='${{ inputs.backend_image_ref }}'
            frontend_image_ref='${{ inputs.frontend_image_ref }}'

            set_env_var() {
              key="$1"
              value="$2"
              file="$3"
              tmp="$(mktemp)"
              awk -v key="$key" -v value="$value" '
                BEGIN { done = 0 }
                $0 ~ "^" key "=" {
                  print key "=" value
                  done = 1
                  next
                }
                { print }
                END {
                  if (done == 0) {
                    print key "=" value
                  }
                }
              ' "$file" > "$tmp"
              cat "$tmp" > "$file"
              rm -f "$tmp"
            }

            cd "$deploy_path"
            set_env_var BACKEND_IMAGE "$backend_image_ref" .env
            set_env_var FRONTEND_IMAGE "$frontend_image_ref" .env
            printf '%s\n' "$target_sha" > .last-deployed-sha
            printf '%s\n' "$target_sha" > .last-deployed-frontend-sha

      - name: rollback
        id: rollback
        if: ${{ failure() && steps.deploy.outcome == 'success' }}
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ vars.DEPLOY_PORT || 22 }}
          fingerprint: ${{ vars.DEPLOY_HOST_FINGERPRINT }}
          command_timeout: 10m
          script: |
            set -Eeuo pipefail

            deploy_path='${{ secrets.DEPLOY_PATH }}'
            backend_image_repo='${{ inputs.backend_image_repo }}'
            frontend_image_repo='${{ inputs.frontend_image_repo }}'

            cd "$deploy_path"
            if [ ! -s .last-deployed-sha ] || [ ! -s .last-deployed-frontend-sha ]; then
              echo "previous deployed shas are missing; rollback unavailable"
              exit 1
            fi

            previous_backend_sha="$(tr -d '[:space:]' < .last-deployed-sha)"
            previous_frontend_sha="$(tr -d '[:space:]' < .last-deployed-frontend-sha)"
            previous_backend_image="$backend_image_repo:$previous_backend_sha"
            previous_frontend_image="$frontend_image_repo:$previous_frontend_sha"

            git fetch --prune origin
            git reset --hard "$previous_backend_sha"

            echo '${{ github.token }}' | docker login ghcr.io -u '${{ github.actor }}' --password-stdin

            cd deployment/docker
            compose() {
              docker compose --env-file ../../.env -f docker-compose.yml -f docker-compose.ci.yml "$@"
            }

            BACKEND_IMAGE="$previous_backend_image" FRONTEND_IMAGE="$previous_frontend_image" compose pull backend frontend
            BACKEND_IMAGE="$previous_backend_image" FRONTEND_IMAGE="$previous_frontend_image" compose up -d --remove-orphans backend frontend
            BACKEND_IMAGE="$previous_backend_image" FRONTEND_IMAGE="$previous_frontend_image" compose up -d --remove-orphans nginx certbot
            BACKEND_IMAGE="$previous_backend_image" FRONTEND_IMAGE="$previous_frontend_image" compose exec -T nginx sh -c 'touch /var/run/certbot/reload-nginx'
            cd ../..

            set_env_var() {
              key="$1"
              value="$2"
              file="$3"
              tmp="$(mktemp)"
              awk -v key="$key" -v value="$value" '
                BEGIN { done = 0 }
                $0 ~ "^" key "=" {
                  print key "=" value
                  done = 1
                  next
                }
                { print }
                END {
                  if (done == 0) {
                    print key "=" value
                  }
                }
              ' "$file" > "$tmp"
              cat "$tmp" > "$file"
              rm -f "$tmp"
            }

            set_env_var BACKEND_IMAGE "$previous_backend_image" .env
            set_env_var FRONTEND_IMAGE "$previous_frontend_image" .env

      - name: verify rollback backend health
        id: rollback_verify_backend
        if: ${{ failure() && steps.rollback.outcome == 'success' }}
        env:
          DEPLOY_HEALTH_URL: ${{ vars.DEPLOY_HEALTH_URL }}
        run: |
          set -Eeuo pipefail

          sleep 3
          if [ -z "${DEPLOY_HEALTH_URL:-}" ]; then
            echo "::error::DEPLOY_HEALTH_URL is required for production rollback health checks"
            exit 1
          fi

          for attempt in $(seq 1 12); do
            body="$(curl -fsS --max-time 5 "$DEPLOY_HEALTH_URL" || true)"
            if printf '%s' "$body" | jq -e '.status == "ok" and .db == "ok" and .redis == "ok" and .seaweedfs == "ok" and (.schema_version | type == "number" and . > 0)' >/dev/null 2>&1; then
              echo "backend rollback health check passed on attempt $attempt"
              exit 0
            fi
            echo "backend rollback health check attempt $attempt failed"
            sleep 5
          done

          echo "backend rollback health check failed after 12 attempts"
          exit 1

      - name: verify rollback frontend health
        id: rollback_verify_frontend
        if: ${{ failure() && steps.rollback.outcome == 'success' }}
        env:
          DEPLOY_FRONTEND_HEALTH_URL: ${{ vars.DEPLOY_FRONTEND_HEALTH_URL }}
        run: |
          set -Eeuo pipefail

          if [ -z "${DEPLOY_FRONTEND_HEALTH_URL:-}" ]; then
            echo "::error::DEPLOY_FRONTEND_HEALTH_URL is required for production rollback health checks"
            exit 1
          fi
          health_url="$DEPLOY_FRONTEND_HEALTH_URL"
          api_url="$(python3 - "$health_url" <<'PY'
          import sys
          from urllib.parse import urlsplit, urlunsplit

          parsed = urlsplit(sys.argv[1])
          print(urlunsplit((parsed.scheme, parsed.netloc, "/api/v1/leaderboard", "", "")))
          PY
          )"

          for attempt in $(seq 1 12); do
            if curl -fsS --max-time 5 "$health_url" >/dev/null; then
              api_body="$(curl -fsS --max-time 5 "$api_url" || true)"
              if printf '%s' "$api_body" | jq -e '.entries | type == "array"' >/dev/null 2>&1; then
                echo "frontend rollback health and same-origin api rewrite checks passed on attempt $attempt"
                exit 0
              fi
              echo "frontend rollback page is healthy but same-origin api rewrite check failed"
            else
              echo "frontend rollback health check attempt $attempt failed"
            fi
            if [ "$attempt" -lt 12 ]; then
              sleep 5
            fi
          done

          echo "frontend rollback health or same-origin api rewrite check failed after 12 attempts"
          exit 1

      - name: notify
        if: ${{ always() }}
        env:
          WEBHOOK_URL: ${{ secrets.TG_DEPLOY_WEBHOOK || secrets.SLACK_DEPLOY_WEBHOOK }}
          TARGET_SHA: ${{ inputs.target_sha }}
          BACKEND_IMAGE_REF: ${{ inputs.backend_image_ref }}
          FRONTEND_IMAGE_REF: ${{ inputs.frontend_image_ref }}
          JOB_STATUS: ${{ job.status }}
          ROLLBACK_OUTCOME: ${{ steps.rollback.outcome }}
          ROLLBACK_BACKEND_VERIFY_OUTCOME: ${{ steps.rollback_verify_backend.outcome }}
          ROLLBACK_FRONTEND_VERIFY_OUTCOME: ${{ steps.rollback_verify_frontend.outcome }}
        run: |
          set -Eeuo pipefail

          if [ -z "$WEBHOOK_URL" ]; then
            echo "::notice::deploy webhook is not configured; notification skipped"
            exit 0
          fi

          text="task-per-minute deploy: $JOB_STATUS
          sha: $TARGET_SHA
          backend image: $BACKEND_IMAGE_REF
          frontend image: $FRONTEND_IMAGE_REF
          rollback: ${ROLLBACK_OUTCOME:-skipped}
          rollback backend health: ${ROLLBACK_BACKEND_VERIFY_OUTCOME:-skipped}
          rollback frontend health: ${ROLLBACK_FRONTEND_VERIFY_OUTCOME:-skipped}"

          jq -n --arg text "$text" '{text: $text}' > /tmp/deploy-notification.json
          curl -fsS -X POST \
            -H 'Content-Type: application/json' \
            --data @/tmp/deploy-notification.json \
            "$WEBHOOK_URL"
