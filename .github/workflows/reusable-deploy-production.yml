name: reusable deploy production

on:
  workflow_call:
    inputs:
      target_sha:
        required: true
        type: string
      backend_image_repo:
        required: true
        type: string
      backend_image_ref:
        required: true
        type: string
      frontend_image_repo:
        required: true
        type: string
      frontend_image_ref:
        required: true
        type: string

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    name: deploy production
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: production
    steps:
      - name: prepare ssh
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_PORT: ${{ vars.DEPLOY_PORT || 22 }}
          DEPLOY_HOST_FINGERPRINT: ${{ vars.DEPLOY_HOST_FINGERPRINT }}
        run: |
          set -Eeuo pipefail

          for var in DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_KEY DEPLOY_PATH DEPLOY_HOST_FINGERPRINT; do
            if [ -z "${!var:-}" ]; then
              echo "::error::$var is required for production deploys"
              exit 1
            fi
          done

          install -d -m 700 "$HOME/.ssh"
          printf '%s\n' "$DEPLOY_SSH_KEY" > "$HOME/.ssh/deploy_key"
          chmod 600 "$HOME/.ssh/deploy_key"

          scan_file="$(mktemp)"
          ssh-keyscan -p "$DEPLOY_PORT" -t ed25519 "$DEPLOY_HOST" > "$scan_file" 2>/dev/null
          actual_fingerprint="$(ssh-keygen -lf "$scan_file" -E sha256 | awk 'NR == 1 { print $2 }')"
          if [ "$actual_fingerprint" != "$DEPLOY_HOST_FINGERPRINT" ]; then
            echo "::error::DEPLOY_HOST_FINGERPRINT mismatch: expected $DEPLOY_HOST_FINGERPRINT, got $actual_fingerprint"
            exit 1
          fi

          cat "$scan_file" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"
          rm -f "$scan_file"

      - name: deploy over ssh
        id: deploy
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_PORT: ${{ vars.DEPLOY_PORT || 22 }}
          TARGET_SHA: ${{ inputs.target_sha }}
          BACKEND_IMAGE_REF: ${{ inputs.backend_image_ref }}
          FRONTEND_IMAGE_REF: ${{ inputs.frontend_image_ref }}
          GHCR_ACTOR: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail

          remote_env="$(
            printf 'DEPLOY_PATH=%q TARGET_SHA=%q BACKEND_IMAGE_REF=%q FRONTEND_IMAGE_REF=%q GHCR_ACTOR=%q GHCR_TOKEN=%q' \
              "$DEPLOY_PATH" "$TARGET_SHA" "$BACKEND_IMAGE_REF" "$FRONTEND_IMAGE_REF" "$GHCR_ACTOR" "$GHCR_TOKEN"
          )"

          ssh -i "$HOME/.ssh/deploy_key" \
            -p "$DEPLOY_PORT" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "$remote_env bash -se" <<'REMOTE'
          set -Eeuo pipefail

          cd "$DEPLOY_PATH"
          git fetch --prune origin
          git reset --hard "$TARGET_SHA"

          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_ACTOR" --password-stdin

          cd deployment/docker
          compose() {
            docker compose --env-file ../../.env -f docker-compose.yml -f docker-compose.ci.yml "$@"
          }

          BACKEND_IMAGE="$BACKEND_IMAGE_REF" FRONTEND_IMAGE="$FRONTEND_IMAGE_REF" compose pull backend frontend
          BACKEND_IMAGE="$BACKEND_IMAGE_REF" FRONTEND_IMAGE="$FRONTEND_IMAGE_REF" compose up -d --remove-orphans backend frontend
          BACKEND_IMAGE="$BACKEND_IMAGE_REF" FRONTEND_IMAGE="$FRONTEND_IMAGE_REF" compose up -d --remove-orphans nginx certbot
          BACKEND_IMAGE="$BACKEND_IMAGE_REF" FRONTEND_IMAGE="$FRONTEND_IMAGE_REF" compose exec -T nginx sh -c 'touch /var/run/certbot/reload-nginx'
          REMOTE

      - name: verify backend health
        id: verify_backend
        env:
          DEPLOY_HEALTH_URL: ${{ vars.DEPLOY_HEALTH_URL }}
        run: |
          set -Eeuo pipefail

          sleep 3
          if [ -z "${DEPLOY_HEALTH_URL:-}" ]; then
            echo "::error::DEPLOY_HEALTH_URL is required for production deploy health checks"
            exit 1
          fi
          health_url="$(python3 - <<'PY'
          import os
          import sys
          from urllib.parse import urlsplit, urlunsplit

          raw = os.environ["DEPLOY_HEALTH_URL"].strip()
          parsed = urlsplit(raw)
          if parsed.scheme not in {"http", "https"} or not parsed.hostname:
              print(f"invalid DEPLOY_HEALTH_URL: {raw!r}", file=sys.stderr)
              sys.exit(1)

          host = parsed.hostname.encode("idna").decode("ascii")
          netloc = host if parsed.port is None else f"{host}:{parsed.port}"
          path = parsed.path or "/"
          print(urlunsplit((parsed.scheme, netloc, path, parsed.query, "")))
          PY
          )"

          for attempt in $(seq 1 12); do
            body="$(curl -fsS --max-time 5 "$health_url" || true)"
            if printf '%s' "$body" | jq -e '.status == "ok" and .db == "ok" and .redis == "ok" and .seaweedfs == "ok" and (.schema_version | type == "number" and . > 0)' >/dev/null 2>&1; then
              echo "backend health check passed on attempt $attempt"
              exit 0
            fi
            echo "backend health check attempt $attempt failed"
            sleep 5
          done

          echo "backend health check failed after 12 attempts"
          exit 1

      - name: verify frontend health
        id: verify_frontend
        env:
          DEPLOY_FRONTEND_HEALTH_URL: ${{ vars.DEPLOY_FRONTEND_HEALTH_URL }}
        run: |
          set -Eeuo pipefail

          if [ -z "${DEPLOY_FRONTEND_HEALTH_URL:-}" ]; then
            echo "::error::DEPLOY_FRONTEND_HEALTH_URL is required for production deploy health checks"
            exit 1
          fi
          health_url="$(python3 - <<'PY'
          import os
          import sys
          from urllib.parse import urlsplit, urlunsplit

          raw = os.environ["DEPLOY_FRONTEND_HEALTH_URL"].strip()
          parsed = urlsplit(raw)
          if parsed.scheme not in {"http", "https"} or not parsed.hostname:
              print(f"invalid DEPLOY_FRONTEND_HEALTH_URL: {raw!r}", file=sys.stderr)
              sys.exit(1)

          host = parsed.hostname.encode("idna").decode("ascii")
          netloc = host if parsed.port is None else f"{host}:{parsed.port}"
          path = parsed.path or "/"
          print(urlunsplit((parsed.scheme, netloc, path, parsed.query, "")))
          PY
          )"
          api_url="$(python3 - "$health_url" <<'PY'
          import sys
          from urllib.parse import urlsplit, urlunsplit

          parsed = urlsplit(sys.argv[1])
          print(urlunsplit((parsed.scheme, parsed.netloc, "/api/v1/leaderboard", "", "")))
          PY
          )"

          for attempt in $(seq 1 12); do
            if curl -fsS --max-time 5 "$health_url" >/dev/null; then
              api_body="$(curl -fsS --max-time 5 "$api_url" || true)"
              if printf '%s' "$api_body" | jq -e '.entries | type == "array"' >/dev/null 2>&1; then
                echo "frontend health and same-origin api rewrite checks passed on attempt $attempt"
                exit 0
              fi
              echo "frontend page is healthy but same-origin api rewrite check failed"
            else
              echo "frontend health check attempt $attempt failed"
            fi
            if [ "$attempt" -lt 12 ]; then
              sleep 5
            fi
          done

          echo "frontend health or same-origin api rewrite check failed after 12 attempts"
          exit 1

      - name: verify auth and websocket smoke
        env:
          DEPLOY_FRONTEND_HEALTH_URL: ${{ vars.DEPLOY_FRONTEND_HEALTH_URL }}
          DEPLOY_SMOKE_ADMIN_PASSWORD: ${{ secrets.DEPLOY_SMOKE_ADMIN_PASSWORD }}
        run: |
          set -Eeuo pipefail

          admin_smoke_enabled=1
          if [ -z "${DEPLOY_SMOKE_ADMIN_PASSWORD:-}" ]; then
            echo "::warning::DEPLOY_SMOKE_ADMIN_PASSWORD is not set; skipping production admin login smoke"
            admin_smoke_enabled=0
          fi
          export DEPLOY_ADMIN_SMOKE_ENABLED="$admin_smoke_enabled"
          python3 -m pip install --disable-pip-version-check websockets==15.0.1
          python3 - <<'PY'
          import asyncio
          import http.cookiejar
          import json
          import os
          import ssl
          import sys
          import time
          import urllib.error
          import urllib.parse
          import urllib.request

          import websockets

          raw = os.environ["DEPLOY_FRONTEND_HEALTH_URL"].strip()
          parsed = urllib.parse.urlsplit(raw)
          if parsed.scheme not in {"http", "https"} or not parsed.netloc:
              raise SystemExit(f"invalid DEPLOY_FRONTEND_HEALTH_URL: {raw!r}")
          origin = urllib.parse.urlunsplit((parsed.scheme, parsed.netloc, "", "", ""))
          ws_scheme = "wss" if parsed.scheme == "https" else "ws"
          ws_url = urllib.parse.urlunsplit((ws_scheme, parsed.netloc, "/ws", "", ""))

          jar = http.cookiejar.CookieJar()
          opener = urllib.request.build_opener(urllib.request.HTTPCookieProcessor(jar))

          def request(method, path, payload=None, extra_headers=None):
              headers = {
                  "Accept": "application/json",
                  "Origin": origin,
              }
              body = None
              if payload is not None:
                  body = json.dumps(payload).encode("utf-8")
                  headers["Content-Type"] = "application/json"
              if extra_headers:
                  headers.update(extra_headers)
              req = urllib.request.Request(
                  urllib.parse.urljoin(origin, path),
                  data=body,
                  headers=headers,
                  method=method,
              )
              with opener.open(req, timeout=10) as resp:
                  data = resp.read()
                  if not data:
                      return resp.status, None
                  return resp.status, json.loads(data.decode("utf-8"))

          username = f"smoke-{int(time.time())}"
          status, player = request("POST", "/api/v1/players/join", {"username": username})
          assert status == 200 and player.get("player_id"), player
          status, me = request("GET", "/api/v1/players/me")
          assert status == 200 and me["player"]["username"] == username

          if os.environ.get("DEPLOY_ADMIN_SMOKE_ENABLED") == "1":
              status, admin = request(
                  "POST",
                  "/api/v1/admin/login",
                  {"password": os.environ["DEPLOY_SMOKE_ADMIN_PASSWORD"]},
              )
              assert status == 200 and admin.get("token_type") == "Bearer"
          else:
              print("admin login smoke skipped because DEPLOY_SMOKE_ADMIN_PASSWORD is not set")

          cookie_header = "; ".join(f"{cookie.name}={cookie.value}" for cookie in jar)
          if "tpm_player_session=" not in cookie_header:
              raise SystemExit("player session cookie missing after join")

          async def ws_smoke():
              ssl_ctx = ssl.create_default_context() if ws_url.startswith("wss://") else None
              async with websockets.connect(
                  ws_url,
                  origin=origin,
                  additional_headers={"Cookie": cookie_header},
                  ssl=ssl_ctx,
                  open_timeout=10,
              ) as ws:
                  await ws.send(json.dumps({"type": "ping"}))
                  message = json.loads(await asyncio.wait_for(ws.recv(), timeout=10))
                  assert message.get("type") == "pong", message

              try:
                  async with websockets.connect(
                      ws_url,
                      origin="https://denied-origin.invalid",
                      additional_headers={"Cookie": cookie_header},
                      ssl=ssl_ctx,
                      open_timeout=10,
                  ):
                      raise AssertionError("denied-origin websocket unexpectedly upgraded")
              except AssertionError:
                  raise
              except Exception:
                  return

          asyncio.run(ws_smoke())
          print("auth and websocket smoke checks passed")
          PY

      - name: persist deployed sha
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_PORT: ${{ vars.DEPLOY_PORT || 22 }}
          TARGET_SHA: ${{ inputs.target_sha }}
          BACKEND_IMAGE_REF: ${{ inputs.backend_image_ref }}
          FRONTEND_IMAGE_REF: ${{ inputs.frontend_image_ref }}
        run: |
          set -Eeuo pipefail

          remote_env="$(
            printf 'DEPLOY_PATH=%q TARGET_SHA=%q BACKEND_IMAGE_REF=%q FRONTEND_IMAGE_REF=%q' \
              "$DEPLOY_PATH" "$TARGET_SHA" "$BACKEND_IMAGE_REF" "$FRONTEND_IMAGE_REF"
          )"

          ssh -i "$HOME/.ssh/deploy_key" \
            -p "$DEPLOY_PORT" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "$remote_env bash -se" <<'REMOTE'
          set -Eeuo pipefail

          set_env_var() {
            key="$1"
            value="$2"
            file="$3"
            tmp="$(mktemp)"
            awk -v key="$key" -v value="$value" '
              BEGIN { done = 0 }
              $0 ~ "^" key "=" {
                print key "=" value
                done = 1
                next
              }
              { print }
              END {
                if (done == 0) {
                  print key "=" value
                }
              }
            ' "$file" > "$tmp"
            cat "$tmp" > "$file"
            rm -f "$tmp"
          }

          cd "$DEPLOY_PATH"
          set_env_var BACKEND_IMAGE "$BACKEND_IMAGE_REF" .env
          set_env_var FRONTEND_IMAGE "$FRONTEND_IMAGE_REF" .env
          printf '%s\n' "$TARGET_SHA" > .last-deployed-sha
          printf '%s\n' "$TARGET_SHA" > .last-deployed-frontend-sha
          REMOTE

      - name: rollback
        id: rollback
        if: ${{ failure() && steps.deploy.outcome == 'success' }}
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_PORT: ${{ vars.DEPLOY_PORT || 22 }}
          BACKEND_IMAGE_REPO: ${{ inputs.backend_image_repo }}
          FRONTEND_IMAGE_REPO: ${{ inputs.frontend_image_repo }}
          GHCR_ACTOR: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail

          remote_env="$(
            printf 'DEPLOY_PATH=%q BACKEND_IMAGE_REPO=%q FRONTEND_IMAGE_REPO=%q GHCR_ACTOR=%q GHCR_TOKEN=%q' \
              "$DEPLOY_PATH" "$BACKEND_IMAGE_REPO" "$FRONTEND_IMAGE_REPO" "$GHCR_ACTOR" "$GHCR_TOKEN"
          )"

          ssh -i "$HOME/.ssh/deploy_key" \
            -p "$DEPLOY_PORT" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "$remote_env bash -se" <<'REMOTE'
          set -Eeuo pipefail

          cd "$DEPLOY_PATH"
          if [ ! -s .last-deployed-sha ] || [ ! -s .last-deployed-frontend-sha ]; then
            echo "previous deployed shas are missing; rollback unavailable"
            exit 1
          fi

          previous_backend_sha="$(tr -d '[:space:]' < .last-deployed-sha)"
          previous_frontend_sha="$(tr -d '[:space:]' < .last-deployed-frontend-sha)"
          previous_backend_image="$BACKEND_IMAGE_REPO:$previous_backend_sha"
          previous_frontend_image="$FRONTEND_IMAGE_REPO:$previous_frontend_sha"

          git fetch --prune origin
          git reset --hard "$previous_backend_sha"

          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_ACTOR" --password-stdin

          cd deployment/docker
          compose() {
            docker compose --env-file ../../.env -f docker-compose.yml -f docker-compose.ci.yml "$@"
          }

          BACKEND_IMAGE="$previous_backend_image" FRONTEND_IMAGE="$previous_frontend_image" compose pull backend frontend
          BACKEND_IMAGE="$previous_backend_image" FRONTEND_IMAGE="$previous_frontend_image" compose up -d --remove-orphans backend frontend
          BACKEND_IMAGE="$previous_backend_image" FRONTEND_IMAGE="$previous_frontend_image" compose up -d --remove-orphans nginx certbot
          BACKEND_IMAGE="$previous_backend_image" FRONTEND_IMAGE="$previous_frontend_image" compose exec -T nginx sh -c 'touch /var/run/certbot/reload-nginx'
          cd ../..

          set_env_var() {
            key="$1"
            value="$2"
            file="$3"
            tmp="$(mktemp)"
            awk -v key="$key" -v value="$value" '
              BEGIN { done = 0 }
              $0 ~ "^" key "=" {
                print key "=" value
                done = 1
                next
              }
              { print }
              END {
                if (done == 0) {
                  print key "=" value
                }
              }
            ' "$file" > "$tmp"
            cat "$tmp" > "$file"
            rm -f "$tmp"
          }

          set_env_var BACKEND_IMAGE "$previous_backend_image" .env
          set_env_var FRONTEND_IMAGE "$previous_frontend_image" .env
          REMOTE

      - name: verify rollback backend health
        id: rollback_verify_backend
        if: ${{ failure() && steps.rollback.outcome == 'success' }}
        env:
          DEPLOY_HEALTH_URL: ${{ vars.DEPLOY_HEALTH_URL }}
        run: |
          set -Eeuo pipefail

          sleep 3
          if [ -z "${DEPLOY_HEALTH_URL:-}" ]; then
            echo "::error::DEPLOY_HEALTH_URL is required for production rollback health checks"
            exit 1
          fi
          health_url="$(python3 - <<'PY'
          import os
          import sys
          from urllib.parse import urlsplit, urlunsplit

          raw = os.environ["DEPLOY_HEALTH_URL"].strip()
          parsed = urlsplit(raw)
          if parsed.scheme not in {"http", "https"} or not parsed.hostname:
              print(f"invalid DEPLOY_HEALTH_URL: {raw!r}", file=sys.stderr)
              sys.exit(1)

          host = parsed.hostname.encode("idna").decode("ascii")
          netloc = host if parsed.port is None else f"{host}:{parsed.port}"
          path = parsed.path or "/"
          print(urlunsplit((parsed.scheme, netloc, path, parsed.query, "")))
          PY
          )"

          for attempt in $(seq 1 12); do
            body="$(curl -fsS --max-time 5 "$health_url" || true)"
            if printf '%s' "$body" | jq -e '.status == "ok" and .db == "ok" and .redis == "ok" and .seaweedfs == "ok" and (.schema_version | type == "number" and . > 0)' >/dev/null 2>&1; then
              echo "backend rollback health check passed on attempt $attempt"
              exit 0
            fi
            echo "backend rollback health check attempt $attempt failed"
            sleep 5
          done

          echo "backend rollback health check failed after 12 attempts"
          exit 1

      - name: verify rollback frontend health
        id: rollback_verify_frontend
        if: ${{ failure() && steps.rollback.outcome == 'success' }}
        env:
          DEPLOY_FRONTEND_HEALTH_URL: ${{ vars.DEPLOY_FRONTEND_HEALTH_URL }}
        run: |
          set -Eeuo pipefail

          if [ -z "${DEPLOY_FRONTEND_HEALTH_URL:-}" ]; then
            echo "::error::DEPLOY_FRONTEND_HEALTH_URL is required for production rollback health checks"
            exit 1
          fi
          health_url="$(python3 - <<'PY'
          import os
          import sys
          from urllib.parse import urlsplit, urlunsplit

          raw = os.environ["DEPLOY_FRONTEND_HEALTH_URL"].strip()
          parsed = urlsplit(raw)
          if parsed.scheme not in {"http", "https"} or not parsed.hostname:
              print(f"invalid DEPLOY_FRONTEND_HEALTH_URL: {raw!r}", file=sys.stderr)
              sys.exit(1)

          host = parsed.hostname.encode("idna").decode("ascii")
          netloc = host if parsed.port is None else f"{host}:{parsed.port}"
          path = parsed.path or "/"
          print(urlunsplit((parsed.scheme, netloc, path, parsed.query, "")))
          PY
          )"
          api_url="$(python3 - "$health_url" <<'PY'
          import sys
          from urllib.parse import urlsplit, urlunsplit

          parsed = urlsplit(sys.argv[1])
          print(urlunsplit((parsed.scheme, parsed.netloc, "/api/v1/leaderboard", "", "")))
          PY
          )"

          for attempt in $(seq 1 12); do
            if curl -fsS --max-time 5 "$health_url" >/dev/null; then
              api_body="$(curl -fsS --max-time 5 "$api_url" || true)"
              if printf '%s' "$api_body" | jq -e '.entries | type == "array"' >/dev/null 2>&1; then
                echo "frontend rollback health and same-origin api rewrite checks passed on attempt $attempt"
                exit 0
              fi
              echo "frontend rollback page is healthy but same-origin api rewrite check failed"
            else
              echo "frontend rollback health check attempt $attempt failed"
            fi
            if [ "$attempt" -lt 12 ]; then
              sleep 5
            fi
          done

          echo "frontend rollback health or same-origin api rewrite check failed after 12 attempts"
          exit 1

      - name: notify
        if: ${{ always() }}
        env:
          WEBHOOK_URL: ${{ secrets.TG_DEPLOY_WEBHOOK || secrets.SLACK_DEPLOY_WEBHOOK }}
          TARGET_SHA: ${{ inputs.target_sha }}
          BACKEND_IMAGE_REF: ${{ inputs.backend_image_ref }}
          FRONTEND_IMAGE_REF: ${{ inputs.frontend_image_ref }}
          JOB_STATUS: ${{ job.status }}
          ROLLBACK_OUTCOME: ${{ steps.rollback.outcome }}
          ROLLBACK_BACKEND_VERIFY_OUTCOME: ${{ steps.rollback_verify_backend.outcome }}
          ROLLBACK_FRONTEND_VERIFY_OUTCOME: ${{ steps.rollback_verify_frontend.outcome }}
        run: |
          set -Eeuo pipefail

          if [ -z "$WEBHOOK_URL" ]; then
            echo "::notice::deploy webhook is not configured; notification skipped"
            exit 0
          fi

          text="task-per-minute deploy: $JOB_STATUS
          sha: $TARGET_SHA
          backend image: $BACKEND_IMAGE_REF
          frontend image: $FRONTEND_IMAGE_REF
          rollback: ${ROLLBACK_OUTCOME:-skipped}
          rollback backend health: ${ROLLBACK_BACKEND_VERIFY_OUTCOME:-skipped}
          rollback frontend health: ${ROLLBACK_FRONTEND_VERIFY_OUTCOME:-skipped}"

          jq -n --arg text "$text" '{text: $text}' > /tmp/deploy-notification.json
          curl -fsS -X POST \
            -H 'Content-Type: application/json' \
            --data @/tmp/deploy-notification.json \
            "$WEBHOOK_URL"
