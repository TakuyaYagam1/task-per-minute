name: reusable backend checks

on:
  workflow_call:
    inputs:
      target_sha:
        required: true
        type: string

permissions:
  contents: read

env:
  GO_VERSION_FILE: backend/go.mod
  GO_WORKDIR: backend

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.target_sha }}

      - name: setup go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: false

      - name: resolve go cache directories
        id: go-cache
        working-directory: ${{ env.GO_WORKDIR }}
        run: |
          echo "gomodcache=$(go env GOMODCACHE)" >> "$GITHUB_OUTPUT"
          echo "gocache=$(go env GOCACHE)" >> "$GITHUB_OUTPUT"

      - name: restore go cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ${{ steps.go-cache.outputs.gomodcache }}
            ${{ steps.go-cache.outputs.gocache }}
          key: ${{ runner.os }}-go-lint-${{ hashFiles('backend/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-lint-
            ${{ runner.os }}-go-

      - name: generate mocks
        working-directory: ${{ env.GO_WORKDIR }}
        run: make mocks

      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.11.4
          working-directory: ${{ env.GO_WORKDIR }}
          args: ./...

  unit-test:
    name: unit test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.target_sha }}

      - name: setup go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: false

      - name: resolve go cache directories
        id: go-cache
        working-directory: ${{ env.GO_WORKDIR }}
        run: |
          echo "gomodcache=$(go env GOMODCACHE)" >> "$GITHUB_OUTPUT"
          echo "gocache=$(go env GOCACHE)" >> "$GITHUB_OUTPUT"

      - name: restore go cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ${{ steps.go-cache.outputs.gomodcache }}
            ${{ steps.go-cache.outputs.gocache }}
          key: ${{ runner.os }}-go-unit-test-${{ hashFiles('backend/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-unit-test-
            ${{ runner.os }}-go-

      - name: generate mocks
        working-directory: ${{ env.GO_WORKDIR }}
        run: make mocks

      - name: make test
        working-directory: ${{ env.GO_WORKDIR }}
        run: make test

  integration-test:
    name: integration test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.target_sha }}

      - name: setup go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: false

      - name: resolve go cache directories
        id: go-cache
        working-directory: ${{ env.GO_WORKDIR }}
        run: |
          echo "gomodcache=$(go env GOMODCACHE)" >> "$GITHUB_OUTPUT"
          echo "gocache=$(go env GOCACHE)" >> "$GITHUB_OUTPUT"

      - name: restore go cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ${{ steps.go-cache.outputs.gomodcache }}
            ${{ steps.go-cache.outputs.gocache }}
          key: ${{ runner.os }}-go-integration-test-${{ hashFiles('backend/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-integration-test-
            ${{ runner.os }}-go-

      - name: check docker
        run: docker version

      - name: make test-int
        working-directory: ${{ env.GO_WORKDIR }}
        run: make test-int

  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.target_sha }}

      - name: setup go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache: false

      - name: resolve go cache directories
        id: go-cache
        working-directory: ${{ env.GO_WORKDIR }}
        run: |
          echo "gomodcache=$(go env GOMODCACHE)" >> "$GITHUB_OUTPUT"
          echo "gocache=$(go env GOCACHE)" >> "$GITHUB_OUTPUT"

      - name: restore go cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ${{ steps.go-cache.outputs.gomodcache }}
            ${{ steps.go-cache.outputs.gocache }}
          key: ${{ runner.os }}-go-build-${{ hashFiles('backend/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-build-
            ${{ runner.os }}-go-

      - name: make build
        working-directory: ${{ env.GO_WORKDIR }}
        run: make build
