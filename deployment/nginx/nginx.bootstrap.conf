worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  server_tokens off;
  server_names_hash_bucket_size 128;
  server_names_hash_max_size 1024;
  sendfile on;
  keepalive_timeout 65s;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  upstream frontend_upstream {
    server ${NGINX_FRONTEND_UPSTREAM};
  }

  upstream backend_upstream {
    server ${NGINX_BACKEND_UPSTREAM};
  }

  upstream files_upstream {
    server ${NGINX_FILES_UPSTREAM};
  }

  server {
    listen 80;
    listen [::]:80;
    server_name _;

    location = /nginx-health {
      access_log off;
      return 204;
    }

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }
  }

  server {
    listen 80;
    listen [::]:80;
    server_name ${NGINX_APP_HOST};

    client_max_body_size 125m;
    client_body_timeout 300s;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location = /ws {
      proxy_pass http://backend_upstream/ws;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_connect_timeout 5s;
      proxy_send_timeout 1h;
      proxy_read_timeout 1h;
      proxy_buffering off;
    }

    location /api/ {
      proxy_pass http://backend_upstream/api/;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_connect_timeout 5s;
      proxy_send_timeout 300s;
      proxy_read_timeout 300s;
    }

    location / {
      proxy_pass http://frontend_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }

  server {
    listen 80;
    listen [::]:80;
    server_name ${NGINX_ADMIN_HOST};

    client_max_body_size 125m;
    client_body_timeout 300s;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location = / {
      return 302 /admin;
    }

    location /api/ {
      proxy_pass http://backend_upstream/api/;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_connect_timeout 5s;
      proxy_send_timeout 300s;
      proxy_read_timeout 300s;
    }

    location / {
      proxy_pass http://frontend_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }

  server {
    listen 80;
    listen [::]:80;
    server_name ${NGINX_API_HOST};

    client_max_body_size 125m;
    client_body_timeout 300s;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location = /ws {
      proxy_pass http://backend_upstream/ws;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_connect_timeout 5s;
      proxy_send_timeout 1h;
      proxy_read_timeout 1h;
      proxy_buffering off;
    }

    location / {
      proxy_pass http://backend_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_connect_timeout 5s;
      proxy_send_timeout 300s;
      proxy_read_timeout 300s;
    }
  }

  server {
    listen 80;
    listen [::]:80;
    server_name ${NGINX_FILES_HOST};

    client_max_body_size 250m;
    client_body_timeout 120s;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      proxy_pass http://files_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_connect_timeout 5s;
      proxy_send_timeout 120s;
      proxy_read_timeout 120s;
    }
  }
}
