name: task-per-minute-local

# Same least-privilege model as docker-compose.yml: no env_file:, every value
# explicitly listed in environment: with `${VAR:?...}` (required) or
# `${VAR:-default}` (optional). Run with:
#   docker compose --env-file ../../.env -f docker-compose.local.yml up -d
#
# IMPORTANT: bcrypt hashes and any value containing a literal `$` MUST be
# escaped to `$$` inside .env (compose interpolates variables in .env values).

services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required (set in .env)}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required (set in .env)}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required (set in .env)}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command:
      - "sh"
      - "-c"
      - |
        if [ -n "$${REDIS_PASSWORD:-}" ]; then
          exec redis-server --save 60 1 --loglevel warning --requirepass "$${REDIS_PASSWORD}"
        fi
        exec redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$${REDIS_PASSWORD:-}\" ]; then REDISCLI_AUTH=\"$${REDIS_PASSWORD}\" redis-cli ping; else redis-cli ping; fi"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 3s

  seaweedfs:
    image: chrislusf/seaweedfs:3.71
    restart: unless-stopped
    environment:
      SEAWEEDFS_ACCESS_KEY: ${SEAWEEDFS_ACCESS_KEY:?SEAWEEDFS_ACCESS_KEY is required (set in .env)}
      SEAWEEDFS_SECRET_KEY: ${SEAWEEDFS_SECRET_KEY:?SEAWEEDFS_SECRET_KEY is required (set in .env)}
    entrypoint:
      - "/bin/sh"
      - "-c"
    command:
      - |
        cat > /tmp/seaweedfs-s3.json <<EOF
        {
          "identities": [
            {
              "name": "tpm",
              "credentials": [
                {
                  "accessKey": "$${SEAWEEDFS_ACCESS_KEY}",
                  "secretKey": "$${SEAWEEDFS_SECRET_KEY}"
                }
              ],
              "actions": ["Admin"]
            }
          ]
        }
        EOF
        exec weed server \
          -dir=/data \
          -master.port=9333 \
          -volume.port=8090 \
          -filer \
          -filer.port=8888 \
          -s3 \
          -s3.port=8333 \
          -s3.config=/tmp/seaweedfs-s3.json
    ports:
      - "9333:9333"
      - "8333:8333"
    volumes:
      - seaweedfs_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9333/cluster/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  migrate:
    build:
      context: ../../backend
    profiles: ["migrate"]
    restart: "no"
    entrypoint: ["/app/migrate"]
    environment:
      DB_DSN: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build:
      context: ../../backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # HTTP
      HTTP_HOST: ${HTTP_HOST:-0.0.0.0}
      HTTP_PORT: ${HTTP_PORT:-8080}
      HTTP_READ_TIMEOUT: ${HTTP_READ_TIMEOUT:-15s}
      HTTP_WRITE_TIMEOUT: ${HTTP_WRITE_TIMEOUT:-15s}
      HTTP_SHUTDOWN_TIMEOUT: ${HTTP_SHUTDOWN_TIMEOUT:-30s}
      HTTP_ALLOWED_ORIGINS: ${HTTP_ALLOWED_ORIGINS:-}
      HTTP_TRUSTED_PROXY_CIDRS: ${HTTP_TRUSTED_PROXY_CIDRS:-}

      # Database
      DB_DSN: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"
      DB_MAX_CONNS: ${DB_MAX_CONNS:-20}

      # Redis
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}

      # SeaweedFS
      SEAWEEDFS_ENDPOINT: seaweedfs:8333
      SEAWEEDFS_PUBLIC_ENDPOINT: ${SEAWEEDFS_PUBLIC_ENDPOINT:-localhost:8333}
      SEAWEEDFS_ACCESS_KEY: ${SEAWEEDFS_ACCESS_KEY:?SEAWEEDFS_ACCESS_KEY is required (set in .env)}
      SEAWEEDFS_SECRET_KEY: ${SEAWEEDFS_SECRET_KEY:?SEAWEEDFS_SECRET_KEY is required (set in .env)}
      SEAWEEDFS_BUCKET: ${SEAWEEDFS_BUCKET:-task-per-minute}
      SEAWEEDFS_SECURE: ${SEAWEEDFS_SECURE:-false}
      SEAWEEDFS_PUBLIC_SECURE: ${SEAWEEDFS_PUBLIC_SECURE:-false}

      # JWT
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required (set in .env)}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-168h}

      # Admin
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required (set in .env)}
      ADMIN_LOGIN_RATE_ATTEMPTS: ${ADMIN_LOGIN_RATE_ATTEMPTS:-5}
      ADMIN_LOGIN_RATE_WINDOW: ${ADMIN_LOGIN_RATE_WINDOW:-15m}
      ADMIN_LOGIN_RATE_BUCKET_TTL: ${ADMIN_LOGIN_RATE_BUCKET_TTL:-1h}

      # Player
      PLAYER_JOIN_RATE_ATTEMPTS: ${PLAYER_JOIN_RATE_ATTEMPTS:-20}
      PLAYER_JOIN_RATE_WINDOW: ${PLAYER_JOIN_RATE_WINDOW:-5m}
      PLAYER_JOIN_RATE_BUCKET_TTL: ${PLAYER_JOIN_RATE_BUCKET_TTL:-1h}

      # WebSocket
      WS_ALLOWED_ORIGINS: ${WS_ALLOWED_ORIGINS:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  seaweedfs_data:
