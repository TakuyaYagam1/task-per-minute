name: task-per-minute

services:
  caddy:
    image: ${CADDY_IMAGE:-caddy:2-alpine}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 32M
    ports:
      - "${CADDY_HTTP_PORT:-${NGINX_HTTP_PORT:-80}}:80"
      - "${CADDY_HTTPS_PORT:-${NGINX_HTTPS_PORT:-443}}:443"
    environment:
      CADDY_ACME_EMAIL: ${CADDY_ACME_EMAIL:-${ACME_EMAIL:-admin@${APP_DOMAIN:?APP_DOMAIN is required for Caddy certificates}}}
      CADDY_ACME_CA: ${CADDY_ACME_CA:-https://acme-v02.api.letsencrypt.org/directory}
      APP_DOMAIN: ${APP_DOMAIN:?APP_DOMAIN is required for Caddy certificates}
      ADMIN_DOMAIN: ${ADMIN_DOMAIN:?ADMIN_DOMAIN is required for Caddy certificates}
      API_DOMAIN: ${API_DOMAIN:?API_DOMAIN is required for Caddy certificates}
      FILES_DOMAIN: ${FILES_DOMAIN:?FILES_DOMAIN is required for Caddy certificates}
      TASK_COOKIE_DOMAIN: ${TASK_COOKIE_DOMAIN:-myfirstsite.${APP_DOMAIN:?APP_DOMAIN is required for Caddy task certificates}}
      TASK_ARCHIVE_DOMAIN: ${TASK_ARCHIVE_DOMAIN:-archive.${APP_DOMAIN:?APP_DOMAIN is required for Caddy task certificates}}
      TASK_SAMOVAR_DOMAIN: ${TASK_SAMOVAR_DOMAIN:-samovar.${APP_DOMAIN:?APP_DOMAIN is required for Caddy task certificates}}
      TASK_VKONTAKTE_DOMAIN: ${TASK_VKONTAKTE_DOMAIN:-vkontakte.${APP_DOMAIN:?APP_DOMAIN is required for Caddy task certificates}}
      TASK_DEDYS_DOMAIN: ${TASK_DEDYS_DOMAIN:-dedys.${APP_DOMAIN:?APP_DOMAIN is required for Caddy task certificates}}
      TASK_COOKIE_UPSTREAM: ${TASK_COOKIE_UPSTREAM:-frontend:3000}
      TASK_ARCHIVE_UPSTREAM: ${TASK_ARCHIVE_UPSTREAM:-frontend:3000}
      TASK_SAMOVAR_UPSTREAM: ${TASK_SAMOVAR_UPSTREAM:-frontend:3000}
      TASK_VKONTAKTE_UPSTREAM: ${TASK_VKONTAKTE_UPSTREAM:-frontend:3000}
      TASK_DEDYS_UPSTREAM: ${TASK_DEDYS_UPSTREAM:-frontend:3000}
      CADDY_FRONTEND_UPSTREAM: ${CADDY_FRONTEND_UPSTREAM:-frontend:3000}
      CADDY_BACKEND_UPSTREAM: ${CADDY_BACKEND_UPSTREAM:-backend:8080}
      CADDY_FILES_UPSTREAM: ${CADDY_FILES_UPSTREAM:-seaweedfs:8333}
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:2019/config/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal

  postgres:
    image: postgres:18.3-alpine3.23
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required (set in .env)}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required (set in .env)}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required (set in .env)}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  redis:
    image: redis:8.6.2-alpine3.23
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required (set in .env)}
    command:
      - "sh"
      - "-c"
      - |
        exec redis-server --save 60 1 --loglevel warning --requirepass "$${REDIS_PASSWORD}"
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=\"$${REDIS_PASSWORD}\" redis-cli ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 3s

  seaweedfs:
    image: chrislusf/seaweedfs:4.20
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 128M
    environment:
      SEAWEEDFS_ACCESS_KEY: ${SEAWEEDFS_ACCESS_KEY:?SEAWEEDFS_ACCESS_KEY is required (set in .env)}
      SEAWEEDFS_SECRET_KEY: ${SEAWEEDFS_SECRET_KEY:?SEAWEEDFS_SECRET_KEY is required (set in .env)}
    entrypoint:
      - "/bin/sh"
      - "-c"
    command:
      - |
        cat > /tmp/seaweedfs-s3.json <<EOF
        {
          "identities": [
            {
              "name": "tpm",
              "credentials": [
                {
                  "accessKey": "$${SEAWEEDFS_ACCESS_KEY}",
                  "secretKey": "$${SEAWEEDFS_SECRET_KEY}"
                }
              ],
              "actions": ["Admin"]
            }
          ]
        }
        EOF
        exec weed server \
          -dir=/data \
          -master.port=9333 \
          -volume.port=8090 \
          -filer \
          -filer.port=8888 \
          -s3 \
          -s3.port=8333 \
          -s3.config=/tmp/seaweedfs-s3.json
    expose:
      - "9333"
      - "8090"
      - "8888"
      - "8333"
    volumes:
      - seaweedfs_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9333/cluster/healthz >/dev/null && nc -z 127.0.0.1 8333"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  backend:
    build:
      context: ../../backend
      args:
        BACKEND_PORT: ${BACKEND_PORT:-8080}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 128M
    expose:
      - "${BACKEND_PORT:-8080}"
    environment:
      # HTTP
      HTTP_HOST: ${HTTP_HOST:-0.0.0.0}
      HTTP_PORT: ${BACKEND_PORT:-8080}
      HTTP_READ_TIMEOUT: ${HTTP_READ_TIMEOUT:-5m}
      HTTP_WRITE_TIMEOUT: ${HTTP_WRITE_TIMEOUT:-5m}
      HTTP_SHUTDOWN_TIMEOUT: ${HTTP_SHUTDOWN_TIMEOUT:-30s}
      HTTP_ALLOWED_ORIGINS: ${HTTP_ALLOWED_ORIGINS:-}
      HTTP_TRUSTED_PROXY_CIDRS: ${HTTP_TRUSTED_PROXY_CIDRS:-}

      # Database
      DB_DSN: ${DB_DSN:?DB_DSN is required (set in .env; use postgres:5432 inside compose)}
      DB_MAX_CONNS: ${DB_MAX_CONNS:-20}

      # Redis
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required (set in .env)}
      REDIS_DB: ${REDIS_DB:-0}

      # SeaweedFS
      SEAWEEDFS_ENDPOINT: ${SEAWEEDFS_ENDPOINT:-seaweedfs:8333}
      SEAWEEDFS_PUBLIC_ENDPOINT: ${SEAWEEDFS_PUBLIC_ENDPOINT:?SEAWEEDFS_PUBLIC_ENDPOINT is required for browser source downloads}
      SEAWEEDFS_ACCESS_KEY: ${SEAWEEDFS_ACCESS_KEY:?SEAWEEDFS_ACCESS_KEY is required (set in .env)}
      SEAWEEDFS_SECRET_KEY: ${SEAWEEDFS_SECRET_KEY:?SEAWEEDFS_SECRET_KEY is required (set in .env)}
      SEAWEEDFS_BUCKET: ${SEAWEEDFS_BUCKET:-task-per-minute}
      SEAWEEDFS_SECURE: ${SEAWEEDFS_SECURE:-false}
      SEAWEEDFS_PUBLIC_SECURE: ${SEAWEEDFS_PUBLIC_SECURE:-true}

      # JWT
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required (set in .env)}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-168h}

      # Admin
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required (set in .env)}
      ADMIN_LOGIN_RATE_ATTEMPTS: ${ADMIN_LOGIN_RATE_ATTEMPTS:-3}
      ADMIN_LOGIN_RATE_WINDOW: ${ADMIN_LOGIN_RATE_WINDOW:-3m}
      ADMIN_LOGIN_RATE_BUCKET_TTL: ${ADMIN_LOGIN_RATE_BUCKET_TTL:-15m}
      ADMIN_REFRESH_RATE_ATTEMPTS: ${ADMIN_REFRESH_RATE_ATTEMPTS:-10}
      ADMIN_REFRESH_RATE_WINDOW: ${ADMIN_REFRESH_RATE_WINDOW:-3m}
      ADMIN_REFRESH_RATE_BUCKET_TTL: ${ADMIN_REFRESH_RATE_BUCKET_TTL:-15m}

      # Player
      PLAYER_JOIN_RATE_ATTEMPTS: ${PLAYER_JOIN_RATE_ATTEMPTS:-20}
      PLAYER_JOIN_RATE_WINDOW: ${PLAYER_JOIN_RATE_WINDOW:-5m}
      PLAYER_JOIN_RATE_BUCKET_TTL: ${PLAYER_JOIN_RATE_BUCKET_TTL:-1h}
      PLAYER_SESSION_TTL: ${PLAYER_SESSION_TTL:-24h}

      # Leaderboard
      LEADERBOARD_RATE_ATTEMPTS: ${LEADERBOARD_RATE_ATTEMPTS:-120}
      LEADERBOARD_RATE_WINDOW: ${LEADERBOARD_RATE_WINDOW:-1m}
      LEADERBOARD_RATE_BUCKET_TTL: ${LEADERBOARD_RATE_BUCKET_TTL:-15m}

      # WebSocket
      WS_ALLOWED_ORIGINS: ${WS_ALLOWED_ORIGINS:-}
      WS_REQUIRE_ORIGIN: ${WS_REQUIRE_ORIGIN:-false}
      WS_HANDSHAKE_RATE_ATTEMPTS: ${WS_HANDSHAKE_RATE_ATTEMPTS:-60}
      WS_HANDSHAKE_RATE_WINDOW: ${WS_HANDSHAKE_RATE_WINDOW:-1m}
      WS_HANDSHAKE_RATE_BUCKET_TTL: ${WS_HANDSHAKE_RATE_BUCKET_TTL:-15m}
      WS_MESSAGE_RATE_ATTEMPTS: ${WS_MESSAGE_RATE_ATTEMPTS:-120}
      WS_MESSAGE_RATE_WINDOW: ${WS_MESSAGE_RATE_WINDOW:-1m}
      WS_ACTION_RATE_ATTEMPTS: ${WS_ACTION_RATE_ATTEMPTS:-30}
      WS_ACTION_RATE_WINDOW: ${WS_ACTION_RATE_WINDOW:-1m}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null \"http://127.0.0.1:$${HTTP_PORT:-8080}/health\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - internal

  frontend:
    build:
      context: ../../frontend
      args:
        BACKEND_PORT: ${BACKEND_PORT:-8080}
        BACKEND_URL: "http://backend:${BACKEND_PORT:-8080}"
        FRONTEND_PORT: ${FRONTEND_PORT:-3000}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
        NEXT_PUBLIC_ADMIN_API_URL: ${NEXT_PUBLIC_ADMIN_API_URL:-}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 64M
    expose:
      - "${FRONTEND_PORT:-3000}"
    environment:
      PORT: ${FRONTEND_PORT:-3000}
      HOSTNAME: 0.0.0.0
      BACKEND_URL: "http://backend:${BACKEND_PORT:-8080}"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null \"http://127.0.0.1:$${PORT:-3000}/health\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - internal

networks:
  internal:
    driver: bridge
    ipam:
      config:
        - subnet: ${DOCKER_INTERNAL_SUBNET:-172.30.0.0/24}

volumes:
  caddy_config:
  caddy_data:
  postgres_data:
  redis_data:
  seaweedfs_data:
