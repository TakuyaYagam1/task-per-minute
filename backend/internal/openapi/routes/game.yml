/api/v1/leaderboard:
  get:
    operationId: getLeaderboard
    tags: [game]
    summary: Top-50 leaderboard
    description: >
      Sorted by wins DESC, average_solve_time_ms ASC.
      Cached for 10 seconds via go-cachekit LRFUCache.
    responses:
      '200':
        description: Top 50 players by wins.
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yml#/LeaderboardResponse'
      '429':
        description: Too many leaderboard requests from the same client IP.
        headers:
          Retry-After:
            description: Seconds until the leaderboard rate window resets.
            schema:
              type: string
        content:
          application/problem+json:
            schema:
              $ref: '../components/schemas.yml#/ProblemDetails'

/api/v1/duels/{id}:
  get:
    operationId: getDuel
    tags: [game]
    summary: Read a duel state (for reconnect)
    description: Only the two participants of the duel may read it; others get 403.
    security:
      - SessionTokenAuth: []
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: Full duel detail.
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yml#/DuelDetailResponse'
      '401':
        description: Missing or invalid session token.
        content:
          application/problem+json:
            schema:
              $ref: '../components/schemas.yml#/ProblemDetails'
      '403':
        description: Caller is not a participant of this duel.
        content:
          application/problem+json:
            schema:
              $ref: '../components/schemas.yml#/ProblemDetails'
      '404':
        description: Duel not found.
        content:
          application/problem+json:
            schema:
              $ref: '../components/schemas.yml#/ProblemDetails'

/health:
  get:
    operationId: healthCheck
    tags: [system]
    summary: Liveness + dependency readiness
    responses:
      '200':
        description: All dependencies healthy.
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yml#/HealthResponse'
      '503':
        description: One or more dependencies are unhealthy.
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yml#/HealthResponse'
