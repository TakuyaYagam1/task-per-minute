              $ref: '../components/schemas.yml#/TaskResponse'
      '401':
        description: Missing or invalid admin session.
        content:
          application/problem+json:
            schema:
              $ref: '../components/schemas.yml#/ProblemDetails'
      '404':
        description: Task not found.
        content:
          application/problem+json:
            schema:
              $ref: '../components/schemas.yml#/ProblemDetails'
      '413':
        description: Request body exceeds the JSON size limit.
        content:
          application/problem+json:
            schema:
              $ref: '../components/schemas.yml#/ProblemDetails'
      '415':
        description: Request content type must be application/json.
        content:
          application/problem+json:
            schema:
              $ref: '../components/schemas.yml#/ProblemDetails'
  put:
    operationId: updateTask
    tags: [admin]
    summary: Update a task (partial update is allowed via PATCH semantics)
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas.yml#/UpdateTaskRequest'
    responses:
      '200':
        description: Updated task.
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yml#/TaskResponse'
      '400':
        description: Validation error.
        content:
          application/problem+json:
            schema:
              $ref: '../components/schemas.yml#/ProblemDetails'
      '401':
        description: Missing or invalid admin session.
        content:
          application/problem+json:
            schema:
              $ref: '../components/schemas.yml#/ProblemDetails'
      '404':
        description: Task not found.
        content:
          application/problem+json:
            schema:
              $ref: '../components/schemas.yml#/ProblemDetails'
  delete:
    operationId: deleteTask
    tags: [admin]
    summary: Delete a task
    description: Returns 409 if the task is referenced by an existing duel or solved history.
    security:
      - BearerAuth: []
    responses:
      '204':
        description: Deleted.
      '401':
        description: Missing or invalid admin session.
        content:
          application/problem+json:
            schema:
              $ref: '../components/schemas.yml#/ProblemDetails'
      '404':
        description: Task not found.
        content:
          application/problem+json:
            schema:
              $ref: '../components/schemas.yml#/ProblemDetails'
      '409':
        description: Task is referenced by an existing duel or solved history.
        content:
          application/problem+json:
            schema:
              $ref: '../components/schemas.yml#/ProblemDetails'

/api/v1/admin/tasks/{id}/source:
  parameters:
    - in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
  post:
    operationId: uploadTaskSource
    tags: [admin]
    summary: Upload a source-file ZIP (≤ 100 MB) and store it in SeaweedFS
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            required: [file]
            properties:
              file:
                type: string
                format: binary
    responses:
      '200':
        description: Stored. Returns the URL to be embedded in task_assigned WS event.
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yml#/UploadSourceResponse'
      '400':
        description: Not a ZIP, missing field, or other validation error.
        content:
          application/problem+json:
            schema:
              $ref: '../components/schemas.yml#/ProblemDetails'
      '401':
        description: Missing or invalid admin session.
        content:
          application/problem+json:
            schema:
              $ref: '../components/schemas.yml#/ProblemDetails'
      '404':
        description: Task not found.
        content:
          application/problem+json:
            schema:
              $ref: '../components/schemas.yml#/ProblemDetails'
      '413':
        description: File exceeds the 100 MB limit.
        content:
          application/problem+json:
            schema:
              $ref: '../components/schemas.yml#/ProblemDetails'
