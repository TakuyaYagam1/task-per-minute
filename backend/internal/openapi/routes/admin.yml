        content:
          application/problem+json:
            schema:
              $ref: '../components/schemas.yml#/ProblemDetails'
      '401':
        description: Missing or invalid admin session.
        content:
          application/problem+json:
            schema:
              $ref: '../components/schemas.yml#/ProblemDetails'

/api/v1/admin/tasks/{id}:
  parameters:
    - in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
  get:
    operationId: getTask
    tags: [admin]
    summary: Read a task by id
    security:
      - BearerAuth: []
