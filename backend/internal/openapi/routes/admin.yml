/api/v1/admin/login:
  post:
    operationId: adminLogin
    tags: [admin]
    summary: Exchange the shared admin password for an admin session
    description: >
      Returns the token pair for backwards-compatible non-browser clients and
      also sets HttpOnly tpm_admin_access and tpm_admin_refresh cookies for
      browser clients. Browser-sourced requests receive cookie-session marker
      values in the JSON token fields and must use X-CSRF-Token with the
      access CSRF token for unsafe admin mutations, and X-CSRF-Token with the
      refresh CSRF token for refresh/logout.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas.yml#/AdminLoginRequest'
    responses:
      '200':
        description: Login OK.
        headers:
          X-CSRF-Token:
            description: CSRF token bound to the HttpOnly tpm_admin_access cookie.
            schema:
              type: string
          X-Admin-Refresh-CSRF-Token:
            description: CSRF token bound to the HttpOnly tpm_admin_refresh cookie.
            schema:
              type: string
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yml#/AdminTokenResponse'
      '401':
        description: Invalid password.
        content:
          application/problem+json:
            schema:
              $ref: '../components/schemas.yml#/ProblemDetails'
      '413':
        description: Request body exceeds the JSON size limit.
        content:
          application/problem+json:
            schema:
              $ref: '../components/schemas.yml#/ProblemDetails'
      '415':
        description: Request content type must be application/json.
        content:
          application/problem+json:
            schema:
              $ref: '../components/schemas.yml#/ProblemDetails'

/api/v1/admin/refresh:
  post:
    operationId: adminRefresh
    tags: [admin]
    summary: Rotate the admin session
    description: >
      Accepts refresh_token from the JSON body or the HttpOnly
      tpm_admin_refresh cookie. Returns the new token pair for
      backwards-compatible non-browser clients and refreshes the HttpOnly admin
      cookies. Cookie-authenticated browser refresh requests receive
      cookie-session marker values in the JSON token fields and must send
      X-CSRF-Token with the refresh CSRF token from
      X-Admin-Refresh-CSRF-Token.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas.yml#/AdminRefreshRequest'
    responses:
      '200':
        description: New token pair.
        headers:
          X-CSRF-Token:
            description: CSRF token bound to the refreshed HttpOnly tpm_admin_access cookie.
            schema:
              type: string
          X-Admin-Refresh-CSRF-Token:
            description: CSRF token bound to the refreshed HttpOnly tpm_admin_refresh cookie.
            schema:
              type: string
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yml#/AdminTokenResponse'
      '401':
        description: Refresh token invalid, expired, or revoked.
        content:
          application/problem+json:
            schema:
              $ref: '../components/schemas.yml#/ProblemDetails'
      '413':
        description: Request body exceeds the JSON size limit.
        content:
          application/problem+json:
            schema:
              $ref: '../components/schemas.yml#/ProblemDetails'
      '415':
        description: Request content type must be application/json.
        content:
          application/problem+json:
            schema:
              $ref: '../components/schemas.yml#/ProblemDetails'

/api/v1/admin/logout:
  post:
    operationId: adminLogout
    tags: [admin]
    summary: Revoke the supplied admin refresh token
    description: |
      Revokes the supplied refresh token so it can no longer be exchanged
      for a new pair. The refresh token can be supplied in the JSON body or
      by the HttpOnly tpm_admin_refresh cookie. The access token is unaffected
      (it expires naturally via its short TTL). Logout does not require a
      currently valid access token, so an expired browser session can still
      revoke the refresh token and clear auth cookies.
      Cookie-authenticated browser requests must send X-CSRF-Token with the
      refresh CSRF token from X-Admin-Refresh-CSRF-Token.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas.yml#/AdminLogoutRequest'
    responses:
      '204':
        description: Refresh token revoked.
      '401':
        description: Missing, invalid, expired, or revoked refresh token.
        content:
          application/problem+json:
            schema:
              $ref: '../components/schemas.yml#/ProblemDetails'
      '413':
        description: Request body exceeds the JSON size limit.
        content:
          application/problem+json:
            schema:
              $ref: '../components/schemas.yml#/ProblemDetails'
      '415':
        description: Request content type must be application/json.
        content:
          application/problem+json:
            schema:
              $ref: '../components/schemas.yml#/ProblemDetails'

/api/v1/admin/players:
  get:
    operationId: listAdminPlayers
    tags: [admin]
    summary: List players with effective leaderboard stats
    security:
      - BearerAuth: []
    parameters:
      - in: query
        name: include_deleted
        required: false
        schema:
          type: boolean
          default: false
    responses:
      '200':
        description: All non-deleted players.
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../components/schemas.yml#/AdminPlayerResponse'
      '401':
        description: Missing or invalid admin session.
        content:
          application/problem+json:
            schema:
              $ref: '../components/schemas.yml#/ProblemDetails'

/api/v1/admin/players/{id}/audit:
  parameters:
    - in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
  get:
    operationId: listAdminPlayerAudit
    tags: [admin]
    summary: List player audit events
    security:
      - BearerAuth: []
    parameters:
      - in: query
        name: limit
        required: false
        schema:
          type: integer
          format: int32
          minimum: 1
          maximum: 200
          default: 50
    responses:
      '200':
        description: Newest-first audit events for the player.
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../components/schemas.yml#/AdminPlayerAuditEventResponse'
      '400':
        description: Invalid query parameter.
        content:
          application/problem+json:
            schema:
              $ref: '../components/schemas.yml#/ProblemDetails'
      '401':
        description: Missing or invalid admin session.
        content:
          application/problem+json:
            schema:
              $ref: '../components/schemas.yml#/ProblemDetails'
      '404':
        description: Player not found.
        content:
          application/problem+json:
            schema:
              $ref: '../components/schemas.yml#/ProblemDetails'

/api/v1/admin/players/{id}:
  parameters:
    - in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
  put:
    operationId: updateAdminPlayer
    tags: [admin]
    summary: Rename a player and override their leaderboard stats
    description: |
      Writes an explicit admin leaderboard override for wins and average solve time.
      Set wins=0 and average_solve_time_ms=0 to remove the player from the public leaderboard.
    security:
      - BearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas.yml#/UpdateAdminPlayerRequest'
    responses:
      '200':
        description: Updated player.
        content:
          application/json:
            schema:
              $ref: '../components/schemas.yml#/AdminPlayerResponse'
      '400':
        description: Validation error.
        content:
          application/problem+json:
            schema:
              $ref: '../components/schemas.yml#/ProblemDetails'
      '401':
        description: Missing or invalid admin session.
        content:
          application/problem+json:
            schema:
              $ref: '../components/schemas.yml#/ProblemDetails'
      '404':
        description: Player not found.
        content:
          application/problem+json:
            schema:
              $ref: '../components/schemas.yml#/ProblemDetails'
      '409':
        description: Username is already taken.
        content:
          application/problem+json:
            schema:
              $ref: '../components/schemas.yml#/ProblemDetails'
      '413':
        description: Request body exceeds the JSON size limit.
        content:
          application/problem+json:
            schema:
              $ref: '../components/schemas.yml#/ProblemDetails'
      '415':
        description: Request content type must be application/json.
        content:
          application/problem+json:
            schema:
              $ref: '../components/schemas.yml#/ProblemDetails'
  delete:
    operationId: deleteAdminPlayer
    tags: [admin]
    summary: Soft-delete an idle player
    description: |
      Soft-deletes the player, clears their session token, and hides them from admin/player leaderboard lists.
      Returns 409 if the player is currently queued or in a duel.
    security:
      - BearerAuth: []
    responses:
      '204':
        description: Deleted.
      '401':
        description: Missing or invalid admin session.
        content:
          application/problem+json:
            schema:
              $ref: '../components/schemas.yml#/ProblemDetails'
      '413':
        description: Request body exceeds the JSON size limit.
        content:
          application/problem+json:
            schema:
              $ref: '../components/schemas.yml#/ProblemDetails'
      '415':
        description: Request content type must be application/json.
        content:
          application/problem+json:
            schema:
              $ref: '../components/schemas.yml#/ProblemDetails'
      '404':
        description: Player not found.
        content:
          application/problem+json:
            schema:
              $ref: '../components/schemas.yml#/ProblemDetails'
      '409':
        description: Player is queued or in a duel.
        content:
          application/problem+json:
            schema:
              $ref: '../components/schemas.yml#/ProblemDetails'

