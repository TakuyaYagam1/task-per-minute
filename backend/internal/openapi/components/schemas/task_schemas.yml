TaskCategory:
  type: string
  enum: [web, crypto, forensics, reverse, pwn, steganography, ppc, osint, mobile, hardware, misc]

TaskDifficulty:
  type: string
  enum: [easy, medium, hard]

TaskResponse:
  type: object
  description: Admin view of a task. The `flag` field is only ever returned to admins, never to players.
  required: [id, title, description, category, difficulty, time_limit, flag, hints, created_at]
  properties:
    id:
      type: string
      format: uuid
    title:
      type: string
      maxLength: 255
    description:
      type: string
      minLength: 1
    category:
      $ref: '#/TaskCategory'
    difficulty:
      $ref: '#/TaskDifficulty'
    time_limit:
      type: integer
      format: int32
      minimum: 1
      description: Per-task time limit in seconds.
    flag:
      type: string
      maxLength: 255
    hints:
      type: array
      minItems: 3
      maxItems: 3
      x-go-type: "[]*string"
      items:
        type: string
        nullable: true
    task_url:
      type: string
      description: Task endpoint. Accepts http(s) URLs or host:port targets for pwn/nc tasks.
      nullable: true
    source_file_url:
      type: string
      format: uri
      nullable: true
    created_at:
      type: string
      format: date-time

CreateTaskRequest:
  type: object
  required: [title, description, category, difficulty, time_limit, flag]
  properties:
    title:
      type: string
      minLength: 1
      maxLength: 255
    description:
      type: string
      minLength: 1
    category:
      $ref: '#/TaskCategory'
    difficulty:
      $ref: '#/TaskDifficulty'
    time_limit:
      type: integer
      format: int32
      minimum: 1
    flag:
      type: string
      minLength: 1
      maxLength: 255
    hints:
      type: array
      maxItems: 3
      x-go-type: "[]*string"
      x-go-type-skip-optional-pointer: true
      items:
        type: string
        nullable: true
    task_url:
      type: string
      description: Task endpoint. Accepts http(s) URLs or host:port targets for pwn/nc tasks.
      nullable: true

UpdateTaskRequest:
  type: object
  properties:
    title:
      type: string
      minLength: 1
      maxLength: 255
    description:
      type: string
      minLength: 1
    category:
      $ref: '#/TaskCategory'
    difficulty:
      $ref: '#/TaskDifficulty'
    time_limit:
      type: integer
      format: int32
      minimum: 1
    flag:
      type: string
      minLength: 1
      maxLength: 255
    hints:
      type: array
      maxItems: 3
      x-go-type: "[]*string"
      items:
        type: string
        nullable: true
    task_url:
      type: string
      description: Task endpoint. Accepts http(s) URLs or host:port targets for pwn/nc tasks.
      nullable: true
      x-go-type: NullableString
      x-go-type-skip-optional-pointer: true
      x-oapi-codegen-extra-tags:
        json: task_url,omitempty
    source_file_url:
      type: string
      format: uri
      description: Set to null to clear an uploaded source file. Non-null values are managed by the source upload endpoint.
      nullable: true
      x-go-type: NullableString
      x-go-type-skip-optional-pointer: true
      x-oapi-codegen-extra-tags:
        json: source_file_url,omitempty

UploadSourceResponse:
  type: object
  required: [source_file_url]
  properties:
    source_file_url:
      type: string
      format: uri
